<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" fill="none" aria-label="AI Model Router favicon">
  <defs>
    <linearGradient id="fbg" x1="0" y1="0" x2="32" y2="32" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#01696f"/>
      <stop offset="100%" stop-color="#006494"/>
    </linearGradient>
  </defs>
  <rect width="32" height="32" rx="7" fill="url(#fbg)"/>
  <!-- input dot -->
  <circle cx="7" cy="16" r="2" fill="#cff0f2"/>
  <!-- stem -->
  <line x1="9" y1="16" x2="15" y2="16" stroke="#cff0f2" stroke-width="1.5" stroke-linecap="round"/>
  <!-- fork up -->
  <line x1="15" y1="16" x2="20" y2="11" stroke="#cff0f2" stroke-width="1.5" stroke-linecap="round"/>
  <!-- fork down -->
  <line x1="15" y1="16" x2="20" y2="21" stroke="#cff0f2" stroke-width="1.5" stroke-linecap="round"/>
  <!-- output top -->
  <circle cx="22" cy="11" r="2" fill="#89c166"/>
  <!-- output bottom -->
  <circle cx="22" cy="21" r="2" fill="#e4ab53"/>
</svg>

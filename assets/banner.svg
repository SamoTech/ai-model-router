<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 640" fill="none" role="img" aria-label="AI Model Router — social preview banner">
  <defs>
    <linearGradient id="bgGrad" x1="0" y1="0" x2="1280" y2="640" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#12110f"/>
      <stop offset="100%" stop-color="#171614"/>
    </linearGradient>
    <linearGradient id="logoGrad" x1="0" y1="0" x2="64" y2="64" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#01696f"/>
      <stop offset="100%" stop-color="#006494"/>
    </linearGradient>
    <radialGradient id="glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#68b7c1" stop-opacity="0.18"/>
      <stop offset="100%" stop-color="#68b7c1" stop-opacity="0"/>
    </radialGradient>
    <filter id="blur4" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="4"/>
    </filter>
    <filter id="blur12" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur stdDeviation="12"/>
    </filter>
  </defs>

  <!-- background -->
  <rect width="1280" height="640" fill="url(#bgGrad)"/>

  <!-- subtle grid lines -->
  <g stroke="#2a2826" stroke-width="1" opacity="0.5">
    <line x1="0" y1="160" x2="1280" y2="160"/>
    <line x1="0" y1="320" x2="1280" y2="320"/>
    <line x1="0" y1="480" x2="1280" y2="480"/>
    <line x1="320" y1="0" x2="320" y2="640"/>
    <line x1="640" y1="0" x2="640" y2="640"/>
    <line x1="960" y1="0" x2="960" y2="640"/>
  </g>

  <!-- glow behind right network -->
  <ellipse cx="960" cy="320" rx="280" ry="220" fill="url(#glow)"/>

  <!-- ── ROUTING NETWORK (right half) ── -->
  <!-- node positions: source=720,320  n1=880,200  n2=880,320  n3=880,440  n4=1040,160  n5=1040,280  n6=1040,380  n7=1040,480  n8=1160,240  n9=1160,400 -->

  <!-- edges (faint teal lines) -->
  <g stroke="#68b7c1" stroke-width="1.5" opacity="0.3" stroke-linecap="round">
    <line x1="720" y1="320" x2="880" y2="200"/>
    <line x1="720" y1="320" x2="880" y2="320"/>
    <line x1="720" y1="320" x2="880" y2="440"/>
    <line x1="880" y1="200" x2="1040" y2="160"/>
    <line x1="880" y1="200" x2="1040" y2="280"/>
    <line x1="880" y1="320" x2="1040" y2="280"/>
    <line x1="880" y1="320" x2="1040" y2="380"/>
    <line x1="880" y1="440" x2="1040" y2="380"/>
    <line x1="880" y1="440" x2="1040" y2="480"/>
    <line x1="1040" y1="160" x2="1160" y2="240"/>
    <line x1="1040" y1="280" x2="1160" y2="240"/>
    <line x1="1040" y1="380" x2="1160" y2="400"/>
    <line x1="1040" y1="480" x2="1160" y2="400"/>
  </g>

  <!-- glowing edge highlights -->
  <g stroke="#68b7c1" stroke-width="2" opacity="0.7" stroke-linecap="round" filter="url(#blur4)">
    <line x1="720" y1="320" x2="880" y2="200"/>
    <line x1="880" y1="200" x2="1040" y2="160"/>
    <line x1="1040" y1="160" x2="1160" y2="240"/>
  </g>

  <!-- source node -->
  <circle cx="720" cy="320" r="18" fill="#1d1c1a" stroke="#68b7c1" stroke-width="2"/>
  <circle cx="720" cy="320" r="7" fill="#68b7c1"/>

  <!-- mid nodes -->
  <circle cx="880" cy="200" r="13" fill="#1d1c1a" stroke="#68b7c1" stroke-width="1.5"/>
  <circle cx="880" cy="200" r="5" fill="#68b7c1"/>
  <circle cx="880" cy="320" r="11" fill="#1d1c1a" stroke="#68b7c1" stroke-width="1.5" opacity="0.7"/>
  <circle cx="880" cy="440" r="11" fill="#1d1c1a" stroke="#68b7c1" stroke-width="1.5" opacity="0.7"/>

  <!-- second layer nodes with verdict colors -->
  <!-- good = green -->
  <rect x="1020" y="143" width="40" height="22" rx="11" fill="#437a22" opacity="0.25"/>
  <rect x="1020" y="143" width="40" height="22" rx="11" fill="none" stroke="#89c166" stroke-width="1.5"/>
  <circle cx="1040" cy="154" r="5" fill="#89c166"/>
  <!-- warn = amber -->
  <rect x="1020" y="263" width="40" height="22" rx="11" fill="#b86a10" opacity="0.2"/>
  <rect x="1020" y="263" width="40" height="22" rx="11" fill="none" stroke="#e4ab53" stroke-width="1.5"/>
  <circle cx="1040" cy="274" r="5" fill="#e4ab53"/>
  <!-- warn -->
  <rect x="1020" y="363" width="40" height="22" rx="11" fill="#b86a10" opacity="0.2"/>
  <rect x="1020" y="363" width="40" height="22" rx="11" fill="none" stroke="#e4ab53" stroke-width="1.5"/>
  <circle cx="1040" cy="374" r="5" fill="#e4ab53"/>
  <!-- bad = red -->
  <rect x="1020" y="463" width="40" height="22" rx="11" fill="#a13544" opacity="0.2"/>
  <rect x="1020" y="463" width="40" height="22" rx="11" fill="none" stroke="#e27a8b" stroke-width="1.5"/>
  <circle cx="1040" cy="474" r="5" fill="#e27a8b"/>

  <!-- output nodes -->
  <circle cx="1160" cy="240" r="14" fill="#1d1c1a" stroke="#89c166" stroke-width="2"/>
  <circle cx="1160" cy="240" r="5" fill="#89c166"/>
  <circle cx="1160" cy="400" r="14" fill="#1d1c1a" stroke="#e4ab53" stroke-width="2"/>
  <circle cx="1160" cy="400" r="5" fill="#e4ab53"/>

  <!-- ── LEFT TEXT BLOCK ── -->
  <!-- logo mark -->
  <rect x="64" y="64" width="56" height="56" rx="14" fill="url(#logoGrad)"/>
  <!-- logo routing icon -->
  <circle cx="78" cy="92" r="4" fill="#cff0f2"/>
  <line x1="82" y1="92" x2="92" y2="92" stroke="#cff0f2" stroke-width="2" stroke-linecap="round"/>
  <line x1="92" y1="92" x2="100" y2="84" stroke="#cff0f2" stroke-width="2" stroke-linecap="round"/>
  <line x1="92" y1="92" x2="100" y2="100" stroke="#cff0f2" stroke-width="2" stroke-linecap="round"/>
  <circle cx="103" cy="84" r="4" fill="#89c166"/>
  <circle cx="103" cy="100" r="4" fill="#e4ab53"/>

  <!-- eyebrow label -->
  <rect x="64" y="148" width="220" height="28" rx="14" fill="#01696f" opacity="0.2"/>
  <rect x="64" y="148" width="220" height="28" rx="14" fill="none" stroke="#68b7c1" stroke-width="1"/>
  <text x="84" y="167" font-family="'Cabinet Grotesk',system-ui,sans-serif" font-size="12" font-weight="700" fill="#68b7c1" letter-spacing="2">OPEN SOURCE · SAMOTECH</text>

  <!-- main title -->
  <text x="64" y="256" font-family="'Cabinet Grotesk',system-ui,sans-serif" font-size="72" font-weight="800" fill="#ece8de" letter-spacing="-2">AI Model</text>
  <text x="64" y="340" font-family="'Cabinet Grotesk',system-ui,sans-serif" font-size="72" font-weight="800" fill="#68b7c1" letter-spacing="-2">Router</text>

  <!-- divider -->
  <line x1="64" y1="368" x2="340" y2="368" stroke="#34322f" stroke-width="1.5"/>

  <!-- subtitle -->
  <text x="64" y="404" font-family="'Satoshi',system-ui,sans-serif" font-size="22" fill="#b0aa9d" font-weight="400">Route workloads to the right model</text>
  <text x="64" y="432" font-family="'Satoshi',system-ui,sans-serif" font-size="22" fill="#b0aa9d" font-weight="400">— not just the loudest one.</text>

  <!-- feature pills -->
  <rect x="64" y="468" width="152" height="32" rx="16" fill="#1d1c1a" stroke="#34322f" stroke-width="1"/>
  <text x="84" y="489" font-family="'Satoshi',system-ui,sans-serif" font-size="13" fill="#68b7c1">Cost calculator</text>

  <rect x="228" y="468" width="142" height="32" rx="16" fill="#1d1c1a" stroke="#34322f" stroke-width="1"/>
  <text x="248" y="489" font-family="'Satoshi',system-ui,sans-serif" font-size="13" fill="#68b7c1">Workload router</text>

  <rect x="382" y="468" width="130" height="32" rx="16" fill="#1d1c1a" stroke="#34322f" stroke-width="1"/>
  <text x="402" y="489" font-family="'Satoshi',system-ui,sans-serif" font-size="13" fill="#68b7c1">Value matrix</text>

  <!-- URL watermark -->
  <text x="64" y="590" font-family="'Satoshi',system-ui,sans-serif" font-size="15" fill="#827c71">samotech.github.io/ai-model-router</text>
</svg>

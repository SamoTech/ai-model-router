name: Deploy Pages

on:
  push:
    branches: [main]
  workflow_dispatch:
  schedule:
    - cron: '0 7 * * 1'

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4.3.1

      - name: Set up Node
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020  # v4.4.0
        with:
          node-version: '20'

      - name: Validate models.json schema
        run: node scripts/validate-models.mjs

      - name: Run unit tests
        run: node --test tests/calculator.test.mjs tests/validate-models.test.mjs

      - name: Verify changelog exists
        run: test -f CHANGELOG.md

      - name: Lint HTML
        run: |
          npm install --save-dev htmlhint@1.1.4 --silent
          npx htmlhint index.html --config .htmlhintrc

  deploy:
    needs: validate
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4.3.1

      - name: Stage deployable files
        run: |
          mkdir -p _site
          cp index.html _site/
          cp .nojekyll _site/
          cp -r assets _site/
          cp -r data _site/
          echo "Deploy bundle:"
          ls -la _site/
          du -sh _site/

      - name: Setup Pages
        uses: actions/configure-pages@983d7736d9b0ae728b81ab479565c72886d7745b  # v5.0.0

      - name: Upload artifact
        uses: actions/upload-pages-artifact@56afc609e74202658d3ffba0e8f6dda462b719fa  # v3.0.1
        with:
          path: _site

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@d6db90164ac5ed86f2b6aed7e0febac5b3c0c03e  # v4.0.5

  health-check:
    needs: deploy
    runs-on: ubuntu-latest
    steps:
      - name: Wait for Pages propagation
        run: sleep 20

      - name: Check live site returns HTTP 200
        run: |
          STATUS=$(curl -o /dev/null -s -w "%{http_code}" https://samotech.github.io/ai-model-router/)
          echo "HTTP status: $STATUS"
          if [ "$STATUS" != "200" ]; then
            echo "Health check failed — expected 200, got $STATUS"
            exit 1
          fi
          echo "Health check passed."

      - name: Check models.json is reachable
        run: |
          STATUS=$(curl -o /dev/null -s -w "%{http_code}" https://samotech.github.io/ai-model-router/data/models.json)
          echo "models.json HTTP status: $STATUS"
          if [ "$STATUS" != "200" ]; then
            echo "models.json unreachable — expected 200, got $STATUS"
            exit 1
          fi
          echo "models.json reachable."

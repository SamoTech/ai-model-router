name: Deploy Pages

on:
  push:
    branches: [main]
  workflow_dispatch:
  schedule:
    - cron: '0 7 * * 1'

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Validate models.json schema
        run: node scripts/validate-models.mjs

      - name: Run unit tests
        run: node --test 'tests/*.test.mjs'

      - name: Verify changelog exists
        run: test -f CHANGELOG.md

      - name: Lint HTML
        run: |
          npm install --save-dev htmlhint@1.1.4 --silent
          npx htmlhint index.html --config .htmlhintrc

  deploy:
    needs: validate
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Stage deployable files
        run: |
          mkdir -p _site
          cp index.html _site/
          cp .nojekyll _site/
          cp -r assets _site/
          cp -r data _site/
          echo "Deploy bundle:"
          ls -la _site/
          du -sh _site/

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

  health-check:
    needs: deploy
    runs-on: ubuntu-latest
    steps:
      - name: Wait for Pages propagation
        run: sleep 20

      - name: Check live site returns HTTP 200
        run: |
          STATUS=$(curl -o /dev/null -s -w "%{http_code}" https://samotech.github.io/ai-model-router/)
          echo "HTTP status: $STATUS"
          if [ "$STATUS" != "200" ]; then
            echo "Health check failed — expected 200, got $STATUS"
            exit 1
          fi
          echo "Health check passed."

      - name: Check models.json is reachable
        run: |
          STATUS=$(curl -o /dev/null -s -w "%{http_code}" https://samotech.github.io/ai-model-router/data/models.json)
          echo "models.json HTTP status: $STATUS"
          if [ "$STATUS" != "200" ]; then
            echo "models.json unreachable — expected 200, got $STATUS"
            exit 1
          fi
          echo "models.json reachable."

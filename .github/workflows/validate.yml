name: validate

on:
  push:
    branches: ['**']
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  validate:
    name: validate
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Validate models.json schema
        run: node scripts/validate-models.mjs

      - name: Run unit tests
        run: node --test 'tests/*.test.mjs'

      - name: Check index.html exists and is non-empty
        run: |
          if [ ! -f index.html ]; then
            echo "ERROR: index.html not found"
            exit 1
          fi
          SIZE=$(wc -c < index.html)
          if [ "$SIZE" -lt 1000 ]; then
            echo "ERROR: index.html is suspiciously small ($SIZE bytes)"
            exit 1
          fi
          echo "index.html present ($SIZE bytes)"

      - name: Check required assets exist
        run: |
          MISSING=0
          for f in assets/logo.svg assets/favicon.svg data/models.json; do
            if [ ! -f "$f" ]; then
              echo "ERROR: required file missing: $f"
              MISSING=$((MISSING+1))
            else
              echo "OK $f"
            fi
          done
          if [ "$MISSING" -gt 0 ]; then exit 1; fi
